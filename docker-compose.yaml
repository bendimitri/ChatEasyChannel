services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root}
      MYSQL_DATABASE: ${DB_NAME:-chat_app}
      MYSQL_USER: ${DB_USER:-chat_user}
      MYSQL_PASSWORD: ${DB_PASS:-chat_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    command: >
      sh -c "attempt=1;
      until npm run migration:run;
      do
        if [ $$attempt -ge 20 ]; then
          echo 'Falha: banco não ficou pronto a tempo para migration';
          exit 1;
        fi;
        echo 'Aguardando banco para executar migration... tentativa' $$attempt;
        attempt=$$((attempt+1));
        sleep 3;
      done;
      npm run start:prod"
    ports:
      - "${HTTP_PORT:-3000}:${HTTP_PORT:-3000}"
      - "${WS_PORT:-3001}:${WS_PORT:-3001}"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-chat_user}
      DB_PASS: ${DB_PASS:-chat_pass}
      DB_NAME: ${DB_NAME:-chat_app}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key}
      HTTP_PORT: ${HTTP_PORT:-3000}
      WS_PORT: ${WS_PORT:-3001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://localhost:5173}
    depends_on:
      - db
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3001}
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  db_data:
  backend_uploads:

